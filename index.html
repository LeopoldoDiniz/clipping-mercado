<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Nexos · Inteligência de Mercado — painel semanal de riscos e oportunidades para a economia brasileira, por setor. Dados abertos, atualizado 2×/semana.">
<meta name="author" content="Leopoldo Diniz">
<meta property="og:title" content="Nexos · Inteligência de Mercado">
<meta property="og:description" content="O que mudou no ambiente de negócios do Brasil esta semana — e o que isso exige de você.">
<meta property="og:type" content="website">
<title>Nexos · Inteligência de Mercado</title>
<style>
  :root{
    --bg:#EBEEEF; --surface:#FFFFFF; --surface-2:#F4F7F7; --surface-3:#EAF0EF;
    --border:#D6DEDE; --border-strong:#C1CDCD;
    --ink:#12211F; --ink-2:#465A59; --ink-3:#7E9090;
    --accent:#0F6E68; --accent-2:#0B4F4A; --accent-soft:#DCEDEB;
    --risk:#BE4238; --opp:#2E8B57; --warn:#C08421; --neutral:#5A7180;
    --risk-soft:#F6E2DF; --opp-soft:#DFF0E7; --warn-soft:#F6ECD7;
    --s-ind:#3B6FB0; --s-com:#C0872B; --s-ser:#6E5AA6; --s-agr:#4E9A4E; --s-con:#B0623C; --s-eco:#B5528C;
    --s-ind-soft:#E1E9F3; --s-com-soft:#F4E9D3; --s-ser-soft:#E9E4F1; --s-agr-soft:#E1EFE1; --s-con-soft:#F2E4DC; --s-eco-soft:#F5E2EE;
    --shadow:0 1px 2px rgba(16,32,30,.05),0 8px 24px rgba(16,32,30,.06);
    --radius:12px; --radius-sm:8px;
    --mono:ui-monospace,"Cascadia Code","Consolas","SF Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0A1112; --surface:#111A1B; --surface-2:#16211F; --surface-3:#1B2725;
    --border:#26332F; --border-strong:#33443F; --ink:#E9EFED; --ink-2:#A4B5B2; --ink-3:#6E827F;
    --accent:#33B3A6; --accent-2:#4FC7BA; --accent-soft:#0E2B29;
    --risk:#E06B60; --opp:#4FB07C; --warn:#DBA544; --neutral:#7C93A2;
    --risk-soft:#2B1917; --opp-soft:#15271D; --warn-soft:#2A2213;
    --s-ind:#6C9BD6; --s-com:#D8A755; --s-ser:#9E8AD1; --s-agr:#6FB96F; --s-con:#CE8560; --s-eco:#D07FB0;
    --s-ind-soft:#16232F; --s-com-soft:#2A2314; --s-ser-soft:#211C2E; --s-agr-soft:#152616; --s-con-soft:#2A1E16; --s-eco-soft:#2A1622;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }}
  :root[data-theme="light"]{
    --bg:#EBEEEF; --surface:#FFFFFF; --surface-2:#F4F7F7; --surface-3:#EAF0EF;
    --border:#D6DEDE; --border-strong:#C1CDCD; --ink:#12211F; --ink-2:#465A59; --ink-3:#7E9090;
    --accent:#0F6E68; --accent-2:#0B4F4A; --accent-soft:#DCEDEB;
    --risk:#BE4238; --opp:#2E8B57; --warn:#C08421; --neutral:#5A7180;
    --risk-soft:#F6E2DF; --opp-soft:#DFF0E7; --warn-soft:#F6ECD7;
    --s-ind:#3B6FB0; --s-com:#C0872B; --s-ser:#6E5AA6; --s-agr:#4E9A4E; --s-con:#B0623C; --s-eco:#B5528C;
    --s-ind-soft:#E1E9F3; --s-com-soft:#F4E9D3; --s-ser-soft:#E9E4F1; --s-agr-soft:#E1EFE1; --s-con-soft:#F2E4DC; --s-eco-soft:#F5E2EE;
    --shadow:0 1px 2px rgba(16,32,30,.05),0 8px 24px rgba(16,32,30,.06);
  }
  :root[data-theme="dark"]{
    --bg:#0A1112; --surface:#111A1B; --surface-2:#16211F; --surface-3:#1B2725;
    --border:#26332F; --border-strong:#33443F; --ink:#E9EFED; --ink-2:#A4B5B2; --ink-3:#6E827F;
    --accent:#33B3A6; --accent-2:#4FC7BA; --accent-soft:#0E2B29;
    --risk:#E06B60; --opp:#4FB07C; --warn:#DBA544; --neutral:#7C93A2;
    --risk-soft:#2B1917; --opp-soft:#15271D; --warn-soft:#2A2213;
    --s-ind:#6C9BD6; --s-com:#D8A755; --s-ser:#9E8AD1; --s-agr:#6FB96F; --s-con:#CE8560; --s-eco:#D07FB0;
    --s-ind-soft:#16232F; --s-com-soft:#2A2314; --s-ser-soft:#211C2E; --s-agr-soft:#152616; --s-con-soft:#2A1E16; --s-eco-soft:#2A1622;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,h5{margin:0;text-wrap:balance;line-height:1.2}
  a{color:inherit;text-decoration:none}
  .num{font-variant-numeric:tabular-nums;font-family:var(--mono)}
  .eyebrow{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .upd{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--ink-3);white-space:nowrap}
  .upd b{color:var(--ink-2);font-weight:600}

  /* ── Header fixo (topo + setores + lentes juntos) ── */
  .app-head{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--surface) 92%,transparent);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .row{max-width:1400px;margin:0 auto;padding:0 24px}
  .r-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-top:11px;padding-bottom:11px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.02em;font-size:19px}
  .brand-txt{display:flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.2}
  .brand-sub{display:flex;align-items:center;gap:9px}
  .brand-by{font-size:11px;font-weight:500;font-style:italic;color:var(--ink-3);letter-spacing:.01em}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .brand small{font-weight:500;color:var(--ink-3);font-size:12px}
  .ver{font-size:10px;font-weight:800;letter-spacing:.03em;color:var(--accent);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 32%,var(--border));padding:1px 6px;border-radius:6px;align-self:center}
  .spacer{flex:1}
  select,.btn{font-family:var(--sans);font-size:13px;color:var(--ink);background:var(--surface-2);
    border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:7px 11px;cursor:pointer}
  select:focus-visible,.btn:focus-visible,button:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn:hover{border-color:var(--accent)}
  .r-sectors{display:flex;gap:2px;overflow-x:auto;border-top:1px solid var(--border)}
  .stab{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:11px 13px;border:0;background:none;
    color:var(--ink-2);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
  .stab:hover{color:var(--ink)}
  .stab .sw{width:9px;height:9px;border-radius:3px;background:var(--c,var(--ink-3))}
  .stab[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--c,var(--accent))}
  .r-lenses{display:flex;align-items:center;gap:6px;overflow-x:auto;padding-top:9px;padding-bottom:9px;border-top:1px solid var(--border)}
  .r-period{display:flex;align-items:center;gap:11px;flex-wrap:wrap;overflow-x:auto;padding-top:9px;padding-bottom:9px;border-top:1px solid var(--border)}
  .pk-lbl{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
  .gseg{display:inline-flex;border:1px solid var(--border-strong);border-radius:var(--radius-sm);overflow:hidden;flex:0 0 auto}
  .gseg button{border:0;border-left:1px solid var(--border);background:var(--surface-2);color:var(--ink-2);font:600 12px var(--sans);padding:6px 12px;cursor:pointer;white-space:nowrap}
  .gseg button:first-child{border-left:0}
  .gseg button:hover{color:var(--ink)}
  .gseg button[aria-pressed="true"]{background:var(--accent);color:#fff}
  .wkchips{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .wkchip{flex:0 0 auto;font:600 12px var(--sans);padding:5px 10px;border:1px solid var(--border);background:var(--surface);border-radius:99px;color:var(--ink-2);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .wkchip:hover{border-color:var(--border-strong);color:var(--ink)}
  .wkchip.on{color:var(--ink);border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,var(--surface))}
  .wkchip .pp{font-size:10px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
  .wkchip.on .pp{color:var(--accent)}
  .pk-lbl2{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:700;min-width:64px;flex:0 0 auto}
  .pk-picks{display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-width:0;margin-left:26px}
  .pk-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .wkchip.mo.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .manchete{font-size:15.5px;font-weight:700;line-height:1.42;color:var(--ink);margin:0 0 13px}
  .hl-row{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:0 0 13px}
  @media (max-width:680px){.hl-row{grid-template-columns:1fr}}
  .hl{border-left:3px solid var(--c,var(--accent));padding:1px 0 1px 11px}
  .hl-t{font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--c,var(--ink-3))}
  .hl-x{font-size:12.5px;color:var(--ink);line-height:1.36;margin-top:3px}
  .leitura-p{font-size:13px;color:var(--ink-2);line-height:1.55;margin:0}
  .more{background:none;border:0;color:var(--accent);font:600 12px var(--sans);cursor:pointer;padding:0 0 0 3px;white-space:nowrap}
  .more:hover{text-decoration:underline}
  .clamp-rest[hidden]{display:none}
  .tab{flex:0 0 auto;padding:7px 12px;border:1px solid var(--border);background:var(--surface);border-radius:99px;
    font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .tab:hover{border-color:var(--border-strong);color:var(--ink)}
  .tab[aria-selected="true"]{background:var(--ink);color:var(--surface);border-color:var(--ink)}
  @media (prefers-color-scheme:dark){.tab[aria-selected="true"]{color:#0A1112}}
  :root[data-theme="dark"] .tab[aria-selected="true"]{color:#0A1112}
  :root[data-theme="light"] .tab[aria-selected="true"]{color:var(--surface)}
  .tab-hi{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 38%,var(--border));color:var(--accent-2);font-weight:700}
  .tab-hi:hover{border-color:var(--accent);color:var(--accent-2)}
  .tab-hi[aria-selected="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
  :root[data-theme="dark"] .tab-hi[aria-selected="true"]{color:#08110F}
  .ctx{margin-left:auto;font-size:11.5px;color:var(--ink-3);white-space:nowrap;padding:4px 8px;background:none;border:0;cursor:pointer;font-family:var(--sans);display:inline-flex;align-items:center;gap:5px}
  .ctx:hover{color:var(--ink-2)}
  .ctx-i{width:14px;height:14px;border-radius:50%;border:1px solid var(--border-strong);display:inline-grid;place-items:center;font-size:9px;font-weight:800;font-style:italic;font-family:Georgia,serif}
  .ctx:hover .ctx-i{border-color:var(--accent);color:var(--accent)}
  .ev-date{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:5px;padding:2px 7px;white-space:nowrap}
  .tag-new{font-size:9px;font-weight:800;letter-spacing:.05em;background:var(--accent);color:#fff;padding:2px 5px;border-radius:5px;text-transform:uppercase}

  .wrap{max-width:1400px;margin:0 auto;padding:22px 24px 48px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-pad{padding:18px}
  .grid{display:grid;gap:16px}
  h2.section-t{font-size:14px;margin:26px 0 12px;display:flex;align-items:center;gap:9px}
  h2.section-t::before{content:"";width:3px;height:14px;background:var(--accent);border-radius:2px;flex:0 0 auto}
  h2.section-t::after{content:"";flex:1;height:1px;background:var(--border)}
  .clickable{cursor:pointer}
  .audit-hint{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px}

  .banner{display:flex;gap:10px;align-items:center;background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,var(--border));
    border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:16px;font-size:12.5px;color:var(--accent-2)}
  :root[data-theme="dark"] .banner{color:var(--accent-2)}
  .banner.hist{background:var(--surface-2);border:1px solid var(--border-strong);color:var(--ink-2)}
  :root[data-theme="dark"] .banner.hist{color:var(--ink-2)}
  .banner.hist span:first-child{font-size:15px;color:var(--ink-3)}
  .note{font-size:12px;color:var(--ink-3);background:var(--surface-2);border:1px dashed var(--border-strong);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:16px;display:flex;gap:9px;align-items:flex-start}
  .mock-badge{font-size:9px;font-weight:800;letter-spacing:.05em;color:var(--warn);border:1px solid var(--warn);padding:1px 5px;border-radius:4px;text-transform:uppercase}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
  .ind-grid{display:grid;grid-template-columns:minmax(200px,270px) 1fr;gap:16px;align-items:start}
  .kpi-col{display:flex;flex-direction:column;gap:10px}
  .ind-grid .chart-scroll{min-width:0}
  @media (max-width:760px){.ind-grid{grid-template-columns:1fr}.kpi-col{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px}
  .kpi .k-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .kpi .k-badge{width:32px;height:32px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;font-size:16px;
    background:color-mix(in srgb,var(--kc) 16%,var(--surface));border:1px solid color-mix(in srgb,var(--kc) 32%,var(--border))}
  .kpi .k-label{font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.04em;line-height:1.2}
  .kpi .k-unit{font-size:12px;color:var(--ink-3);font-weight:500}
  .info{margin-left:auto;flex:0 0 auto;width:16px;height:16px;border-radius:50%;border:1px solid var(--border-strong);
    background:var(--surface-2);color:var(--ink-3);font-size:10px;font-weight:800;font-style:italic;cursor:pointer;
    display:grid;place-items:center;position:relative;font-family:Georgia,serif;padding:0}
  .info:hover{border-color:var(--accent);color:var(--accent)}
  .info::after{content:attr(data-tip);position:absolute;bottom:130%;right:-4px;width:230px;background:#12211F;color:#F4F7F7;
    font-size:11px;font-weight:400;font-style:normal;line-height:1.4;text-transform:none;letter-spacing:0;padding:9px 11px;border-radius:8px;
    box-shadow:var(--shadow);opacity:0;visibility:hidden;transition:opacity .15s;z-index:20;pointer-events:none;text-align:left}
  :root[data-theme="dark"] .info::after{background:#05100F;color:#F4F7F7}
  .info:hover::after,.info:focus-visible::after{opacity:1;visibility:visible}
  .chart-scroll{overflow-x:auto;margin:6px -4px 0}
  .schips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
  .schip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:99px;
    border:1px solid var(--border);background:var(--surface);color:var(--ink-3);cursor:pointer}
  .schip .sw{width:9px;height:9px;border-radius:3px}
  .schip.on{color:var(--ink);border-color:var(--sc,var(--accent))}
  .schip:hover{border-color:var(--border-strong)}
  .schip-setor{border-style:dashed}
  /* seletor multi-setor de indicadores */
  .setor-sel{margin:2px 0 14px}
  .ss-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .ss-lbl{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-2)}
  .ss-chips{display:flex;gap:7px;flex-wrap:wrap}
  .ss-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:99px;
    border:1px solid var(--border);background:var(--surface);color:var(--ink-2);cursor:pointer;position:relative;transition:.12s}
  .ss-chip .ss-ico{font-size:14px}
  .ss-chip:hover:not(.off){border-color:var(--accent);color:var(--accent-2)}
  .ss-chip.on{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 42%,var(--border));color:var(--accent-2);font-weight:700}
  .ss-chip.off{opacity:.55;cursor:not-allowed}
  .ss-tag{font-size:9px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:1px 5px;border-radius:5px;
    background:var(--surface-2);color:var(--ink-3);border:1px solid var(--border)}
  .ss-chip.on .ss-tag{background:var(--surface);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 30%,var(--border))}
  .ss-chip[data-tip]::after{content:attr(data-tip);position:absolute;bottom:130%;left:0;width:240px;background:#12211F;color:#F4F7F7;
    font-size:11px;font-weight:400;line-height:1.4;text-transform:none;letter-spacing:0;padding:9px 11px;border-radius:8px;
    box-shadow:var(--shadow);opacity:0;visibility:hidden;transition:opacity .15s;z-index:20;pointer-events:none;text-align:left}
  .ss-chip[data-tip]:hover::after{opacity:1;visibility:visible}
  :root[data-theme="dark"] .ss-chip[data-tip]::after{background:#05100F}
  /* card de indicador setorial: destaque sutil (borda tracejada no topo) */
  .kpi-setor{border-color:color-mix(in srgb,var(--accent) 34%,var(--border));background:color-mix(in srgb,var(--accent) 4%,var(--surface))}
  .kpi-setor .k-head{flex-wrap:wrap}
  .k-setor{font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);
    background:var(--accent-soft);border-radius:5px;padding:1px 6px;margin-left:2px}
  .kpi .k-val{font-size:22px;font-weight:700;margin-top:3px;display:flex;align-items:center;gap:7px}
  .kpi .k-sub{font-size:11px;color:var(--ink-3);margin-top:5px;line-height:1.35}
  .arrow{font-size:12px;font-weight:800}
  .up{color:var(--opp)} .down{color:var(--risk)} .neutral{color:var(--neutral)}

  .editorial{display:grid;grid-template-columns:1.6fr 1fr;gap:18px}
  .editorial p{margin:0 0 11px;color:var(--ink);max-width:62ch}
  .editorial .lead::first-letter{font-size:2.6em;font-weight:800;float:left;line-height:.82;padding:4px 8px 0 0;color:var(--accent)}
  .pulse{display:flex;flex-direction:column;gap:14px}
  .gauge{--v:0;position:relative;height:8px;border-radius:99px;background:var(--surface-3);overflow:hidden}
  .gauge > i{position:absolute;inset:0 auto 0 0;width:calc(var(--v)*1%);background:linear-gradient(90deg,var(--opp),var(--warn),var(--risk))}
  .gmark{position:absolute;top:-3px;width:2px;height:14px;background:var(--ink);border-radius:2px;translate:-1px 0}
  .mini{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-2)}
  .legend{font-size:11px;color:var(--ink-3);line-height:1.45;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px}
  .legend b{color:var(--ink-2)}
  /* Pulso-herói */
  .pulse-card{border-left:3px solid var(--accent)}
  .press{display:flex;align-items:center;gap:14px}
  .press-num{font-family:var(--mono);font-weight:800;font-size:34px;line-height:1;color:var(--ink);flex:0 0 auto}
  .press-num small{font-size:14px;color:var(--ink-3);font-weight:600}
  /* Destaques da semana */
  .hl-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .hl-col{display:flex;flex-direction:column;gap:10px}

  .matrix-wrap{display:grid;grid-template-columns:1.25fr 1fr;gap:18px;align-items:start}

    background:linear-gradient(var(--border),var(--border)) center/1px 100% no-repeat,linear-gradient(var(--border),var(--border)) center/100% 1px no-repeat,var(--surface-2);margin:8px 0 0}

  .q-tl{top:0;left:0} .q-tr{top:0;right:0;text-align:right;color:var(--risk)} .q-bl{bottom:0;left:0} .q-br{bottom:0;right:0;text-align:right}
  .pt{position:absolute;width:16px;height:16px;border-radius:50%;transform:translate(-50%,50%);border:2px solid var(--surface);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.25)}

  .ax{font-size:11px;color:var(--ink-3);display:flex;justify-content:space-between;margin-top:6px}

  .heat td.cell.off{cursor:default}

  .cadeia{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:14px}

  .cbucket li{font-size:12.5px;color:var(--ink-2);padding-left:16px;position:relative;line-height:1.35}

  .force{cursor:pointer}

  .traj{padding:16px 0;border-top:1px solid var(--border);cursor:pointer}

  .news{display:flex;flex-direction:column}

  .nw p{font-size:13px;color:var(--ink-2);margin:0 0 9px;max-width:74ch}

  /* ── Drawer de evidências ── */
  .drawer{position:fixed;top:0;right:0;height:100dvh;width:410px;max-width:92vw;background:var(--surface);
    border-left:1px solid var(--border-strong);box-shadow:-12px 0 40px rgba(0,0,0,.18);z-index:60;

  /* scrim NÃO bloqueia no desktop (clique passa e o drawer atualiza no lugar); no mobile, fecha ao tocar */
  .scrim{position:fixed;inset:0;background:transparent;z-index:55;display:none;pointer-events:none}
  .scrim.on{display:block}
  .ev-active{outline:2px solid var(--accent);outline-offset:2px}
  @media (max-width:700px){.drawer{width:100vw}.scrim.on{background:rgba(0,0,0,.4);pointer-events:auto}}

  @media (max-width:820px){.editorial{grid-template-columns:1fr}.matrix-wrap{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .tab,.stab,.btn,.pt,.drawer,.cbucket,.force{transition:all .15s ease}
</style>
</head>

<header class="app-head">

<script>
/* ───────── DADOS ───────── */
const SECTORS=[
  {id:"panorama",nome:"Panorama geral",cor:"var(--accent)",sw:"var(--accent)"},

  {id:"ecommerce",nome:"E-commerce",cor:"var(--s-eco)",soft:"var(--s-eco-soft)"},

const DIMS={P:"Político",E:"Econômico",S:"Social",T:"Tecnológico",A:"Ambiental",L:"Legal"};

let WEEKS=[
  {k:"W28",lbl:"Semana 28",dt:"06–10 jul 2026",full:"6 a 10 de julho de 2026",mes:"2026-07",tri:"2026-T3"},
  {k:"W27",lbl:"Semana 27",dt:"30 jun–04 jul 2026",full:"30 de junho a 4 de julho de 2026",mes:"2026-07",tri:"2026-T3"},
  {k:"W26",lbl:"Semana 26",dt:"23–27 jun 2026",full:"23 a 27 de junho de 2026",mes:"2026-06",tri:"2026-T2"},

let WMETA=Object.fromEntries(WEEKS.map(w=>[w.k,w]));

// hist = leitura conhecida em cada edição [W25,W26,W27,W28] (mais antigo→recente)
let KPIS=[
  {id:"selic",label:"SELIC",ico:"🏦",val:"14,15%",unit:"a.a.",cor:"down",sub:"Selic efetiva · BCB/SGS · 09/07",hist:[14.25,14.25,14.15,14.15],un:"%",
   info:"Taxa básica de juros da economia. Encarece (ou barateia) o crédito e os investimentos. Definida pelo Copom (meta) e apurada pelo Banco Central (efetiva). Fonte determinística: BCB/SGS série 432→4189."},
  {id:"ipca",label:"IPCA",ico:"📈",val:"0,16%",unit:"mês",cor:"up",sub:"Acum. 12m 4,64% · IBGE · jun/26",hist:[0.35,0.28,0.22,0.16],un:"%",
   info:"Inflação oficial ao consumidor. Mede a variação de preços da cesta das famílias. Calculado pelo IBGE; espelhado na série BCB/SGS 433 (mês) e 13522 (acum. 12m)."},
  {id:"cambio",label:"Câmbio US$",ico:"🌎",val:"R$ 5,13",unit:"",cor:"up",sub:"Dólar PTAX venda · BCB · 09/07",hist:[5.32,5.28,5.20,5.13],un:"R$",
   info:"Preço do dólar em reais (PTAX de venda). Afeta custo de insumos importados, exportações e inflação. Fonte: BCB/SGS série 1."},
  {id:"desemprego",label:"Desemprego",ico:"👥",val:"5,6%",unit:"",cor:"up",sub:"PNAD · IBGE · mar-abr-mai/26",hist:[6.2,6.0,5.8,5.6],un:"%",
   info:"Taxa de desocupação da população economicamente ativa, no trimestre móvel. Fonte: IBGE/SIDRA tabela 6381, variável 4099."},
  {id:"varejo",label:"Varejo (PMC)",ico:"🛒",val:"−0,3%",unit:"mês",cor:"down",sub:"Vol. vendas · IBGE · abr/26",hist:[0.4,0.1,-0.1,-0.3],un:"%",

function adaptKpisSetor(rawSetor,allData){
  return (rawSetor||[]).map(k=>{const setor=k.setor;const meta=SETOR_IMETA[setor]||{ico:"📊",info:""};
    const raw=[],rawA=[];
    CHRONO.forEach(w=>{const d=allData.find(x=>x._k===w.k);const kk=(d&&d.kpis_setoriais||[]).find(z=>z.setor===setor);
      raw.push(kk&&kk.pt!=null?kk.pt:null);rawA.push(kk&&kk.acum!=null?kk.acum:null);});
    let last=null;const fwd=raw.map(v=>{if(v!=null)last=v;return last;});const fst=fwd.find(v=>v!=null);
    const hist=fwd.map(v=>v!=null?v:(fst!=null?fst:0));
    let lastA=null;const acum=rawA.map(v=>{if(v!=null)lastA=v;return lastA;});
    return {id:"s_"+setor,setor,setorLabel:k.setorLabel,label:k.label,ico:meta.ico,val:k.valor,unit:"",
      cor:k.cor||"neutral",sub:k.sub,hist,acum,flow:!!k.flow,un:k.flow?"%":"",info:meta.info,setorial:true};});
}

let CHRONO=WEEKS.slice().reverse(); // objetos, mais antigo→mais recente
/* ── Datação: granularidade + multi-seleção. O ESCOPO selecionado rege todos os painéis. ── */
const MESNOME={"01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril","05":"Maio","06":"Junho","07":"Julho","08":"Agosto","09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"};
const mesLbl=id=>{const[y,m]=id.split("-");return `${MESNOME[m]||m}/${y.slice(2)}`;};
const triLbl=id=>`${id.slice(-1)}º tri ${id.slice(2,4)}`;
const lastWeekOfMonth=mid=>{const ws=WEEKS.filter(w=>w.mes===mid).map(w=>+w.k.slice(1));return ws.length?Math.max(...ws):"";};
// itens disponíveis por granularidade, em ordem cronológica (antigo→recente); parcial = período vigente (não fechado)
function granItems(g){
  const uniq=a=>[...new Set(a)];
  if(g==="semana")return CHRONO.map(w=>({id:w.k,lbl:"Sem "+w.k.slice(1),sub:w.dt.replace(/ 20\d\d/,""),parcial:false}));
  if(g==="mes"){const ids=uniq(WEEKS.map(w=>w.mes)).sort();const mx=ids[ids.length-1];return ids.map(id=>({id,lbl:mesLbl(id),parcial:id===mx}));}
  if(g==="trimestre"){const ids=uniq(WEEKS.map(w=>w.tri)).sort();const mx=ids[ids.length-1];return ids.map(id=>({id,lbl:triLbl(id),parcial:id===mx}));}
  const ids=uniq(WEEKS.map(w=>w.mes.slice(0,4))).sort();const mx=ids[ids.length-1];return ids.map(id=>({id,lbl:id,parcial:id===mx}));
}
// semanas do escopo, cronológicas (antigo→recente). Nunca vazio.
function scopeKeys(){
  const g=state.gran,p=state.picks;
  const match=w=>g==="semana"?p.includes(w.k):g==="mes"?p.includes(w.mes):g==="trimestre"?p.includes(w.tri):p.includes(w.mes.slice(0,4));
  const keys=CHRONO.filter(match).map(w=>w.k);
  return keys.length?keys:[CHRONO[CHRONO.length-1].k];
}
const refKey=()=>{const k=scopeKeys();return k[k.length-1];}; // semana de referência = mais recente do escopo
function periodScope(){
  const weeks=scopeKeys(),g=state.gran,picks=state.picks;
  let label,nota=null;
  if(g==="semana"){
    if(weeks.length===1){const w=WMETA[weeks[0]];label=`Semana ${weeks[0].slice(1)} · ${w?w.full:""}`;}
    else{label=`Semanas ${weeks.map(k=>k.slice(1)).join(", ")}`;nota=`Escopo de ${weeks.length} semanas selecionadas. Relevância = pico do sinal no período.`;}
  }else if(g==="mes"){
    const its=granItems("mes").filter(i=>picks.includes(i.id));
    label=its.map(i=>i.parcial?`${i.lbl} · parcial até sem ${lastWeekOfMonth(i.id)}`:i.lbl).join(" · ");
    nota=`Acumulado de ${weeks.length} semana(s) ${its.length>1?"dos meses selecionados":"do mês"}. Relevância = pico no período.`;
  }else if(g==="trimestre"){
    const its=granItems("trimestre").filter(i=>picks.includes(i.id));
    label=its.map(i=>i.parcial?`${i.lbl} · parcial`:i.lbl).join(" · ");
    nota=`Acumulado de ${weeks.length} semana(s) do(s) trimestre(s). Relevância = pico no período.`;
  }else{
    label=`${picks.join(", ")} · acumulado no ano (YTD)`;
    nota=`Acumulado de ${weeks.length} semana(s) apuradas. Relevância = pico no período.`;
  }
  return {weeks,label,nota};
}
function chartWeeks(){
  const weeks=scopeKeys();
  if(state.gran==="semana"&&weeks.length===1){ // semana única → ela + a imediatamente anterior (2 pontos)
    const upto=CHRONO.findIndex(w=>w.k===weeks[0]);
    return CHRONO.slice(Math.max(0,upto-1),upto+1);
  }
  return CHRONO.filter(w=>weeks.includes(w.k)); // escopo agregado: apenas as semanas selecionadas
}
function sigPeriodRel(s,weeks){const pts=(s.traj||[]).filter(t=>weeks.includes(t[0]));if(!pts.length)return null;return Math.max(...pts.map(t=>t[2]));}
function sigs(){
  const {weeks}=periodScope();
  let list=SIGNALS.filter(s=>inSector(s.setores));
  if(weeks.length>1){list=list.map(s=>({...s,rel:sigPeriodRel(s,weeks)??s.rel}));} // agregado: pico no período
  return list.sort((a,b)=>b.rel-a.rel);
}
const news=()=>NEWS.filter(n=>inSector(n.setores));
const pestel=()=>PESTEL.filter(p=>inSector(p.setores));
// Pressão do ambiente por setor: média dos scores PESTEL do setor ponderada pela relevância dos sinais ativos.
function pressao(){
  const ps=pestel();if(!ps.length)return PRESSAO;
  const sg=sigs();
  const avgScore=ps.reduce((a,p)=>a+p.score,0)/ps.length;         // 0–10
  const avgRel=sg.length?sg.reduce((a,s)=>a+s.rel,0)/sg.length:60; // 0–100
  return Math.max(0,Math.min(100,Math.round(avgScore*10*0.6+avgRel*0.4)));
}

/* evidências: notícias que embasam um contexto */
function newsFor({tema,dim,cadeia,sector}){
  let list=NEWS.slice();
  if(tema) list=list.filter(n=>(n.temas||[]).includes(tema));
  else if(cadeia) list=list.filter(n=>n.cadeia===cadeia);
  else if(dim) list=list.filter(n=>n.dim===dim);
  const sec=sector||(state.sector!=="panorama"?state.sector:null);
  if(sec && !tema) list=list.filter(n=>n.setores.includes(sec));
  return list;
}

let ALLDATA=null,METAS=null;
// recarrega a semana de referência do escopo e re-renderiza tudo
function applyScope(){
  if(ALLDATA){const rk=refKey();const d=ALLDATA.find(x=>x._k===rk);if(d)applyData(d,ALLDATA,METAS);}
  render();

function renderPeriodBar(){
  const bar=document.getElementById("periodBar");if(!bar)return;
  const GRAN=[["semana","Semana"],["mes","Mês"],["trimestre","Trimestre"],["ano","Ano"]];
  const seg=GRAN.map(([id,nm])=>`<button data-gran="${id}" aria-pressed="${state.gran===id}">${nm}</button>`).join("");
  let groups;
  if(state.gran==="semana"){
    // filtro de MÊS (multi) + as semanas dos meses selecionados (evita o paredão)
    const months=[...new Set(CHRONO.map(w=>w.mes))]; // cronológico
    let sel=Array.isArray(state.weekMonths)?state.weekMonths.filter(m=>months.includes(m)):[];
    if(!sel.length)sel=[(WMETA[state.picks[state.picks.length-1]]||{}).mes||months[months.length-1]];
    state.weekMonths=sel;
    const moChips=months.map(mid=>`<button class="wkchip mo ${sel.includes(mid)?'on':''}" data-wkmonth="${mid}" aria-pressed="${sel.includes(mid)}">${MESNOME[mid.split("-")[1]]||mesLbl(mid)}</button>`).join("");
    const wkChips=CHRONO.filter(w=>sel.includes(w.mes)).map(w=>{const on=state.picks.includes(w.k);
      return `<button class="wkchip ${on?'on':''}" data-pick="${w.k}" aria-pressed="${on}">Sem ${w.k.slice(1)}<span class="pp">${w.dt.replace(/ 20\d\d/,"")}</span></button>`;}).join("");
    groups=`<div class="pk-picks"><div class="pk-row"><span class="pk-lbl2">Mês</span><div class="wkchips">${moChips}</div></div><div class="pk-row"><span class="pk-lbl2">Semanas</span><div class="wkchips">${wkChips}</div></div></div>`;
  }else{
    const chips=granItems(state.gran).map(it=>{const on=state.picks.includes(it.id);
      const sub=it.sub?`<span class="pp">${it.sub}</span>`:"";const pp=it.parcial?`<span class="pp">parcial</span>`:"";
      return `<button class="wkchip ${on?'on':''}" data-pick="${it.id}" aria-pressed="${on}">${it.lbl}${sub}${pp}</button>`;}).join("");
    groups=`<div class="wkchips">${chips}</div>`;
  }
  bar.innerHTML=`<span class="pk-lbl">Período</span><div class="gseg">${seg}</div>${groups}`;
  bar.querySelectorAll("[data-gran]").forEach(b=>b.onclick=()=>{
    if(state.gran===b.dataset.gran)return;
    state.gran=b.dataset.gran;
    const its=granItems(state.gran);
    state.picks=its.length?[its[its.length-1].id]:[]; // padrão: período mais recente
    if(state.gran==="semana")state.weekMonths=[(WMETA[state.picks[0]]||{}).mes].filter(Boolean);
    state.pointSig=null;applyScope();
  });
  bar.querySelectorAll("[data-wkmonth]").forEach(b=>b.onclick=()=>{
    const mid=b.dataset.wkmonth;let sel=(state.weekMonths||[]).slice();
    const wksM=CHRONO.filter(w=>w.mes===mid).map(w=>w.k);
    if(sel.includes(mid)){
      if(sel.length>1){ // desmarca mês + remove suas semanas do escopo
        sel=sel.filter(m=>m!==mid);
        state.picks=state.picks.filter(k=>!wksM.includes(k));
        if(!state.picks.length){const vis=CHRONO.filter(w=>sel.includes(w.mes));if(vis.length)state.picks=[vis[vis.length-1].k];}
      }
    }else{ // marca mês + adiciona todas as suas semanas ao escopo
      sel.push(mid);wksM.forEach(k=>{if(!state.picks.includes(k))state.picks.push(k);});
    }
    state.weekMonths=sel;state.pointSig=null;applyScope();
  });
  bar.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.pick,i=state.picks.indexOf(id);
    if(i>=0){if(state.picks.length>1)state.picks.splice(i,1);} // mantém ao menos 1 selecionado
    else state.picks.push(id);
    state.pointSig=null;applyScope();
  });
}

function kpiCard(k){

/* ── Gráfico de evolução dos indicadores (SVG, comparação de séries) ── */
// pontos do gráfico: semanal = por semana (S#); mensal/tri/ano = por mês (fechamento do mês no escopo)
function chartPoints(){
  const wk=chartWeeks();
  if(state.gran==="semana")return {monthly:false,points:wk.map(w=>({label:"S"+parseInt(w.k.slice(1),10),idx:CHRONO.findIndex(c=>c.k===w.k),dt:w.dt}))};
  const maxMonth=[...new Set(WEEKS.map(w=>w.mes))].sort().pop();
  const months=[...new Set(wk.map(w=>w.mes))]; // cronológico (wk já é asc)
  return {monthly:true,points:months.map(mid=>{const wm=wk.filter(w=>w.mes===mid);const lw=wm[wm.length-1];
    return {label:mesLbl(mid),idx:CHRONO.findIndex(c=>c.k===lw.k),partial:mid===maxMonth};})};
}
function chartCard(){
  const W=680,H=240,pl=42,pr=48,pt=16,pb=34;
  const keys=state.chartSeries;
  const series=keys.map(k=>KPIMAP[k]).filter(Boolean);
  const {monthly,points}=chartPoints();
  // valor por ponto: mensal+fluxo -> acumulado no ano; senão -> valor do período (nível/semana)
  const valOf=(s,p)=>{const raw=(monthly&&s.flow)?s.acum[p.idx]:s.hist[p.idx];return raw!=null?raw:s.hist[p.idx];};
  const valsOf=s=>points.map(p=>valOf(s,p));
  const all=series.flatMap(valsOf).filter(v=>v!=null);
  let mn=all.length?Math.min(...all):0,mx=all.length?Math.max(...all):1;if(mn===mx){mn-=1;mx+=1;}const pad=(mx-mn)*0.15;mn-=pad;mx+=pad;
  const n=points.length;
  const x=i=>n===1?pl+(W-pl-pr)/2:pl+(i*(W-pl-pr)/(n-1));
  const y=v=>pt+(H-pt-pb)*(1-(v-mn)/(mx-mn));
  const gridY=4;
  const grid=Array.from({length:gridY+1},(_,i)=>{const gv=mn+(mx-mn)*i/gridY;const gy=y(gv);
    return `<line x1="${pl}" x2="${W-pr}" y1="${gy}" y2="${gy}" stroke="var(--border)" stroke-width="1"/><text x="${pl-6}" y="${gy+3}" text-anchor="end" font-size="9" fill="var(--ink-3)" font-family="var(--mono)">${dec(gv,1)}</text>`;}).join("");
  const xlab=points.map((p,i)=>`<text x="${x(i)}" y="${H-12}" text-anchor="middle" font-size="9" fill="var(--ink-3)">${p.label}${p.partial?' ·p':''}</text>`).join("");
  const lines=series.map((s,si)=>{const c=CHART_COLORS[si%CHART_COLORS.length];const vs=valsOf(s);
    const pts=vs.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
    const dots=vs.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="${i===n-1?4:3}" fill="${c}" stroke="var(--surface)" stroke-width="1.5"/>`).join("");
    const above=si%2===0;
    const vlab=vs.map((v,i)=>`<text x="${x(i)}" y="${y(v)+(above?-9:15)}" text-anchor="middle" font-size="9" font-weight="${i===n-1?700:600}" fill="${c}" font-family="var(--mono)">${dec(v,2)}${s.un==='%'?'%':''}</text>`).join("");
    return `<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linejoin="round"/>${dots}${vlab}`;}).join("");
  const chipSeries=KPIS.concat(selSetorKpis()); // macros + setoriais selecionados
  const chips=chipSeries.map(k=>{const on=keys.includes(k.id);const ci=keys.indexOf(k.id);const c=on?CHART_COLORS[ci%CHART_COLORS.length]:"var(--ink-3)";
    return `<button class="schip ${on?'on':''}${k.setorial?' schip-setor':''}" data-series="${k.id}" style="${on?`--sc:${c}`:''}"><span class="sw" style="background:${on?c:'var(--border-strong)'}"></span>${k.label}</button>`;}).join("");
  const janela=n===1?"1 leitura":`${points[0].label} → ${points[n-1].label}`;
  const partial=points.some(p=>p.partial);
  const legend=monthly
    ? `Valor <b>por mês</b> — <b>acumulado no ano</b> (fluxo: IPCA, varejo, PIM, IPP, Serviços/PMS) ou <b>fechamento do mês</b> (nível: SELIC, câmbio, desemprego, custo/m²). Cada ponto reflete o <b>mês de referência</b> mais recente (defasagem de divulgação; acum. reinicia em janeiro — <a href="#" data-goto="metodologia" style="color:var(--accent);font-weight:600">metodologia</a>).${partial?' <b>·p</b> = mês vigente parcial.':''} Fonte: BCB/SGS e IBGE/SIDRA (oficiais).`
    : `Valor de cada indicador <b>por semana</b> (S = nº da semana) · clique para comparar até 3 séries.${DATA_LOADED?' Fonte: BCB/SGS e IBGE/SIDRA (oficiais).':''}`;
  return `<div class="card card-pad">
    <div style="display:flex;justify-content:flex-end;margin-bottom:2px"><span class="eyebrow">${janela}</span></div>
    <div class="legend" style="margin:2px 0 6px">${legend}</div>
    <div class="chart-scroll"><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Gráfico de evolução dos indicadores">
      ${grid}${xlab}${lines}</svg></div>
    <div class="schips">${chips}</div></div>`;
}

  ${heatmap()}`;
}
function heatmap(){
  const cols=SECTORS.filter(s=>s.id!=="panorama");
  const scale=v=>`background:color-mix(in srgb, var(--accent) ${Math.round(Math.max(.1,Math.min(1,v/10))*100)}%, var(--surface-3))`;
  const rows=Object.keys(DIMS).map(d=>{
    const p=PESTEL.find(x=>x.dim===d);
    const cells=cols.map(c=>{const on=p&&p.setores.includes(c.id);const v=on?p.score:0;
      return `<td class="cell ${on?'clickable':'off'}" ${on?`data-dim="${d}" data-sec="${c.id}"`:''} style="${on?scale(v):'background:var(--surface-2);color:var(--ink-3)'}">${on?dec(v,1):'·'}</td>`;}).join("");
    return `<tr><td class="lbl">${d} · ${DIMS[d]}</td>${cells}</tr>`;
  }).join("");
  return `<div class="card card-pad heat-scroll"><table class="heat"><thead><tr><th class="lbl"></th>${cols.map(c=>`<th style="color:${c.cor}">${c.nome}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function viewMetodologia(){
  const kpiRows=KPIS.map(k=>`<tr><td class="lbl" style="padding:6px 8px 6px 0;white-space:nowrap">${k.ico} <b>${k.label}</b></td><td style="padding:6px 0;color:var(--ink-2);font-size:12px">${k.info.split(" Fonte")[1]?"Fonte"+k.info.split(" Fonte")[1]:k.sub}</td></tr>`).join("");
  return `
  <div class="note" style="margin-bottom:16px"><span>▸</span><div>Transparência total: como os dados entram, como são calculados, o que a IA faz — e o que ela <b>não</b> faz. Tudo aqui é auditável nas <a href="#" data-goto="fontes" style="color:var(--accent);font-weight:600">Fontes</a> e nos <a href="https://raw.githubusercontent.com/LeopoldoDiniz/clipping-mercado/main/data/ultimo.json" target="_blank" rel="noopener" style="color:var(--accent);font-weight:600">dados abertos (JSON)</a>.</div></div>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr))">

    <div class="card card-pad"><h4 style="margin-bottom:10px">🗓️ Como e quando atualiza</h4>
      <ul style="font-size:12.5px;color:var(--ink-2);margin:0;padding-left:18px;line-height:1.6">
        <li>O motor roda automaticamente <b>duas vezes por semana</b>, sempre às <b>07h (horário de Brasília)</b> — <span style="font-family:var(--mono);font-size:11px">10:00 UTC</span>:
          <ul style="margin:4px 0 0;padding-left:16px"><li><b>Segunda-feira, 07h</b> — edição principal da semana;</li><li><b>Quinta-feira, 07h</b> — atualização do que mudou.</li></ul></li>
        <li>Cada rodada: coleta as notícias da semana → revisa os sinais anteriores → recalcula relevância → grava a memória → publica os dados do portal.</li>
        <li>Vale a regra <b>1 ciclo = 1 semana</b>: a rodada de quinta atualiza o que mudou sem inflar a relevância.</li>
        <li>Cada edição é <b>versionada por período</b> (ex.: 2026-W28), preservando o histórico.</li>
        <li>No <b>topo do painel</b> você vê a <b>última publicação</b> e a <b>próxima rodada prevista</b>.</li></ul></div>

    <div class="card card-pad"><h4 style="margin-bottom:10px">🏦 Indicadores macro — regra de cálculo</h4>
      <p style="font-size:12.5px;color:var(--ink-2);margin:0 0 8px">Valores <b>determinísticos</b>, buscados direto na API oficial. A IA <b>não</b> gera número macro.</p>
      <div class="heat-scroll"><table style="width:100%;border-collapse:collapse;font-size:12px">${kpiRows}</table></div></div>

    <div class="card card-pad"><h4 style="margin-bottom:10px">Σ Acumulado no ano — como o IBGE calcula</h4>
      <p style="font-size:12.5px;color:var(--ink-2);margin:0 0 8px">O <b>acumulado no ano</b> dos índices de fluxo (IPCA, varejo/PMC, PIM, IPP) <b>não é a soma</b> das variações mensais: é a <b>composição</b> delas —</p>
      <div class="legend" style="font-family:var(--mono);font-size:11px">acum. = [ ∏ (1 + iₘ/100) − 1 ] × 100, de janeiro ao mês de referência</div>
      <ul style="font-size:12px;color:var(--ink-2);margin:10px 0 0;padding-left:18px;line-height:1.6">
        <li>Reinicia em <b>janeiro</b> de cada ano (jan = a própria variação do mês).</li>
        <li>Por <b>defasagem de divulgação</b>, o dado mais recente refere-se ao <b>mês anterior</b> (o IPCA de junho sai em julho). Assim, no <b>início de cada ano</b> o acumulado disponível ainda é o <b>fechamento do ano anterior</b> — em janeiro/2026, o IPCA vigente é o de dez/2025 (acum. 2025). Não é erro: é o último dado oficial publicado.</li>
        <li>Para <b>nível/estoque</b> (SELIC, câmbio, desemprego) não há acumulado — vale o <b>valor de fechamento</b> do período.</li>
        <li>Validado contra o IBGE: IPCA 2026 jan–mai = <b>3,20%</b>; jan–jun = <b>3,36%</b>.</li></ul>
      <p style="font-size:11px;color:var(--ink-3);margin:8px 0 0">Fonte/metodologia: <a href="https://www.ibge.gov.br/explica/inflacao.php" target="_blank" rel="noopener" style="color:var(--accent);font-weight:600">IBGE · Inflação</a>.</p></div>

    <div class="card card-pad"><h4 style="margin-bottom:10px">📡 Como um sinal é medido</h4>
      <p style="font-size:12.5px;color:var(--ink-2);margin:0 0 8px">Cada risco/oportunidade recebe uma <b>relevância (0–100)</b>:</p>
      <div class="legend" style="font-family:var(--mono);font-size:11px">relevância = (severidade·0,35 + iminência·0,25 + persistência·0,20 + corroboração·0,20) × 10 × mult × decaimento</div>
      <ul style="font-size:12px;color:var(--ink-2);margin:10px 0 0;padding-left:18px;line-height:1.6">
        <li><b>severidade</b> e <b>iminência</b> (0–10): tamanho e proximidade do impacto;</li>
        <li><b>persistência</b>: nº de semanas em que reapareceu (teto 10);</li>
        <li><b>corroboração</b>: nº de fontes que o confirmam (teto 10);</li>
        <li><b>mult</b> = 1,25 quando o evento se materializa;</li>
        <li><b>decaimento</b>: −10% por semana sem reaparecer (piso 0,4);</li>
        <li>abaixo de <b>25</b> por <b>3 ciclos</b>, o sinal "dorme" e sai do radar ativo.</li></ul></div>

    <div class="card card-pad"><h4 style="margin-bottom:10px">🔖 Status e ciclo de vida</h4>
      <div style="display:flex;flex-direction:column;gap:9px;font-size:12.5px;color:var(--ink-2)">
        <div><span class="st monitorar">monitorar</span> identificado, aguardando desdobramento.</div>
        <div><span class="st em_curso">em curso</span> evoluindo nas fontes, ganhando persistência.</div>
        <div><span class="st materializado">materializado</span> o previsto ocorreu (relevância ×1,25).</div>
        <div><span class="chip">dormindo</span> perdeu tração por vários ciclos — arquivado, mas recuperável se reaparecer.</div></div></div>

   O painel nasce com os dados de demonstração (mock) acima. boot() busca o JSON

   dados reais nas estruturas — mantendo idêntica toda a UI/UX do protótipo.
   O que o motor ENTREGA hoje vira dado real: KPIs, editorial, PESTEL, sinais
   (longitudinal) e notícias (clipping) para Indústria/Comércio/Serviços(+transversal).
   O que o motor NÃO entrega ainda (impacto/iminência da matriz, cadeia, agenda,

const MFULL=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

function deriveWeek(chave){
  const m=/(\d{4})-W(\d+)/.exec(chave)||[];const y=+m[1]||2026,w=+m[2]||1;
  const mon=isoWeekMonday(y,w),fri=new Date(mon),thu=new Date(mon);
  fri.setUTCDate(mon.getUTCDate()+4);thu.setUTCDate(mon.getUTCDate()+3);
  const d1=mon.getUTCDate(),d2=fri.getUTCDate(),m1=mon.getUTCMonth(),m2=fri.getUTCMonth();
  const dt=m1===m2?`${pad2(d1)}–${pad2(d2)} ${MABBR[m2]} ${y}`:`${pad2(d1)} ${MABBR[m1]}–${pad2(d2)} ${MABBR[m2]} ${y}`;
  const full=m1===m2?`${d1} a ${d2} de ${MFULL[m2]} de ${y}`:`${d1} de ${MFULL[m1]} a ${d2} de ${MFULL[m2]} de ${y}`;
  const mm=thu.getUTCMonth(),yy=thu.getUTCFullYear();
  return {k:weekKey(chave),lbl:`Semana ${w}`,dt,full,mes:`${yy}-${pad2(mm+1)}`,tri:`${yy}-T${Math.floor(mm/3)+1}`};

const parseNum=v=>{if(v==null)return null;const m=String(v).replace(/\.(?=\d{3}\b)/g,"").match(/-?\d+(?:,\d+)?/);return m?parseFloat(m[0].replace(",",".")):null;};

function kpiFamily(label){const l=(label||"").toLowerCase();

  if(/câmbio|cambio|dólar|dolar/.test(l))return"cambio";

const parseAcum=sub=>{const m=/acum\.\s*ano\s*(-?\d+(?:[.,]\d+)?)\s*%/i.exec(sub||"");return m?parseFloat(m[1].replace(",",".")):null;};
function adaptKpis(rawKpis,allData){
  const seen=new Set(),out=[];
  (rawKpis||[]).forEach(k=>{const fam=kpiFamily(k.label);if(fam!=="outro"&&seen.has(fam))return;seen.add(fam);
    const meta=KPI_META[fam]||KPI_META.outro;const raw=[],rawA=[];
    CHRONO.forEach(w=>{const d=allData.find(x=>x._k===w.k);let v=null,a=null;

    let last=null;const fwd=raw.map(v=>{if(v!=null)last=v;return last;});

    let lastA=null;const acum=rawA.map(v=>{if(v!=null)lastA=v;return lastA;}); // acum. ano, forward-fill

function adaptSignals(long){return (long||[]).map(l=>{

function clampText(t){
  t=(t||"").trim();if(!t)return"";
  const s=t.split(/(?<=[.!?])\s+/).map(x=>x.trim()).filter(Boolean);
  const head=s[0]||t;
  if(s.length<=1||head.length>=t.length-2||t.length<=170)return `<span>${t}</span>`;
  const rest=t.slice(head.length).trim();
  return `<span class="clampw"><span>${head}</span><span class="clamp-rest" hidden> ${rest}</span> <button class="more" data-more type="button">ver mais</button></span>`;
}
// highlight (head) + texto completo distinto recolhível, com rótulo próprio
function clampFull(head,full,label){
  head=(head||"").trim();full=(full||"").trim();
  if(!full||full.length<=head.length+2)return full||head;
  const rest=full.slice(head.length).trim()||full;
  const lb=label||"ver mais";
  return `<span class="clampw"><span>${head}</span><span class="clamp-rest" hidden> ${rest}</span> <button class="more" data-more="${lb}" type="button">${lb}</button></span>`;
}
// leitura da seleção: manchete + 3 highlights + parágrafo curto — segue ESCOPO (período) e SETOR
function leitura(){
  const sec=state.sector,isPan=sec==="panorama",list=sigs();
  const top=list[0],risco=list.find(s=>s.tipo==="risco"),opp=list.find(s=>s.tipo==="oportunidade");
  const nome=isPan?"Panorama":SMETA[sec].nome;
  let manchete;
  if(DATA_LOADED)manchete=HIST_ONLY?(firstN(EDITORIAL,1)||`${nome}: indicadores oficiais.`):(isPan?firstN(EDITORIAL,1):(top?`${nome}: ${top.t}.`:`${nome}: leitura da seleção.`));
  else manchete=isPan?LEITURA.quote:((SETOR_ANALISE[sec]||{}).quote||LEITURA.quote);
  const H=[];
  if(!HIST_ONLY){
    if(top)H.push({tag:top.tipo==="risco"?"Destaque · risco":"Destaque · oportunidade",txt:top.t,cor:top.tipo==="risco"?"var(--risk)":"var(--opp)"});
    if(risco&&risco!==top)H.push({tag:"Maior risco",txt:risco.t,cor:"var(--risk)"});
    if(opp&&opp!==top)H.push({tag:"Maior oportunidade",txt:opp.t,cor:"var(--opp)"});
  }
  let paragrafo,full=null;
  if(DATA_LOADED){
    if(HIST_ONLY){paragrafo=EDITORIAL||"Indicadores oficiais disponíveis; sem cobertura de clipping nesta semana.";}
    else if(isPan){full=EDITORIAL;paragrafo=firstN(EDITORIAL,3);}
    else{paragrafo=leituraSetorial(sec,list);}
  }else{
    const base=isPan?ediParas(EDITORIAL):((SETOR_ANALISE[sec]||{}).edi||ediParas(EDITORIAL));
    full=base.join(" ");paragrafo=firstN(full,3);
  }
  return {manchete,H,paragrafo,full,nome};
}
// parágrafo setorial derivado dos sinais reais do escopo (factual, não fabricado)
function leituraSetorial(sec,list){
  const nome=SMETA[sec].nome,P=pressao();
  const tom=P>=65?"ambiente tensionado":P>=45?"ambiente neutro":"ambiente de alívio";
  const r=list.filter(s=>s.tipo==="risco").slice(0,2).map(s=>s.t);
  const o=list.filter(s=>s.tipo==="oportunidade").slice(0,2).map(s=>s.t);
  let out=`Em ${nome}: ${tom} (pressão ${P}/100).`;
  if(r.length)out+=` Riscos em foco — ${r.join("; ")}.`;
  if(o.length)out+=` Oportunidades — ${o.join("; ")}.`;
  if(!r.length&&!o.length)out+=" Sem sinais próprios do setor na seleção; veja os transversais abaixo.";
  return out;
}
const STOP=new Set("para com uma que dos das nos nas por sobre como mais menos ainda entre este esta esse essa aquele governo semana brasil setor após ante sem sob suas seus pelo pela nova novo novas novos deve podem pode".split(" "));
const toks=t=>new Set((t||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").split(/[^a-z0-9]+/).filter(w=>w.length>3&&!STOP.has(w)));
function newsForSig(s){
  if(s.tema){const bt=NEWS.filter(n=>(n.temas||[]).includes(s.tema));if(bt.length)return bt;}
  const w=toks(s.t+" "+(s.obs||""));const sc=NEWS.map(n=>{const nt=toks(n.t+" "+n.txt);let k=0;w.forEach(x=>{if(nt.has(x))k++;});return {n,k};}).filter(x=>x.k>0).sort((a,b)=>b.k-a.k);
  if(sc.length)return sc.slice(0,5).map(x=>x.n);
  return NEWS.filter(n=>n.dim===s.dim&&n.setores.some(x=>s.setores.includes(x))).slice(0,5);}
function previaSetor(){
  if(!DATA_LOADED||state.sector==="panorama")return"";
  // prévia quando NÃO há item marcado especificamente para o setor (transversal não conta)
  if(SIGNALS.some(s=>s.setores.includes(state.sector))||NEWS.some(n=>n.setores.includes(state.sector)))return"";
  return `<div class="banner"><span>◔</span><div><b>Prévia de ${SMETA[state.sector].nome}.</b> O motor ainda não gera dados próprios deste setor — a cobertura completa chega na próxima evolução do motor. Você vê abaixo a leitura geral da semana e os sinais transversais (que afetam todos os setores).</div></div>`;}
function applyData(sel,allData,metas){
  WEEKS=metas;WMETA=Object.fromEntries(WEEKS.map(w=>[w.k,w]));CHRONO=WEEKS.slice().reverse();
  longByWeek={};allData.forEach(d=>{longByWeek[d._k]=d.longitudinal||[];});
  KPIS=adaptKpis(sel.kpis||[],allData);
  KPIS_SETOR=adaptKpisSetor(sel.kpis_setoriais||[],allData);
  KPIMAP=Object.fromEntries(KPIS.concat(KPIS_SETOR).map(k=>[k.id,k]));
  if(!Array.isArray(state.indSetores))state.indSetores=[];
  state.indSetores=state.indSetores.filter(s=>KPIS_SETOR.some(k=>k.setor===s)); // só setores com dado real
  state.chartSeries=state.chartSeries.filter(id=>!id.startsWith("s_")||KPIMAP[id]); // limpa séries setoriais órfãs
  if(!state.chartSeries.every(id=>KPIMAP[id])){const ids=KPIS.map(k=>k.id);const pref=["ipca","ipp","selic","cambio"].filter(id=>KPIMAP[id]);state.chartSeries=(pref.length>=2?pref.slice(0,2):ids.slice(0,2));}
  if(sel.editorial&&sel.editorial.texto){EDITORIAL=sel.editorial.texto;LEITURA.quote=firstSentence(EDITORIAL);}
  SIGNALS=adaptSignals(sel.longitudinal||[]);SIGNALS.forEach((s,i)=>{s.i=i;});
  MATRIX_REAL=(sel.longitudinal||[]).some(l=>l.severidade!=null&&l.iminencia!=null);
  PESTEL=adaptPestel(sel.pestel||[]);
  NEWS=adaptNews(sel.clipping||[],WMETA[sel._k]);
  PORTER_REAL=!!(sel.porter&&Object.keys(sel.porter).length);
  PORTER=PORTER_REAL?mergePorter(sel.porter):PORTER_BASE;
  // semana histórica: só indicadores oficiais + editorial macro derivado; sem clipping (busca retroativa não confiável)
  HIST_ONLY=(sel.origem==="indicadores_oficiais")||(sel.busca_retroativa===false);
  DATA_LOADED=true;}
async function boot(){
  try{
    const base="./data/";
    const idx=await (await fetch(base+"index.json",{cache:"no-store"})).json();
    LAST_UPDATE=idx.atualizado_em||null;
    const sem=(idx.semanas||[]).slice().sort((a,b)=>(b.ordem||0)-(a.ordem||0));
    if(!sem.length)throw new Error("index sem semanas");
    const metas=sem.map(s=>deriveWeek(s.chave));
    const datas=await Promise.all(sem.map(async s=>{const d=await (await fetch(base+s.arquivo,{cache:"no-store"})).json();d._k=weekKey(s.chave);return d;}));
    ALLDATA=datas;METAS=metas;
    state.gran="semana";state.picks=[metas[0].k];state.pointSig=null; // padrão: semana mais recente
    applyData(datas[0],datas,metas);
    render();
  }catch(err){console.warn("Nexos: exibindo dados de demonstração (data/ indisponível).",err);}}

/* ───────── CONTROLES ───────── */
document.getElementById("themeBtn").onclick=()=>{const cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",cur==="dark"?"light":"dark");};

function render(){renderHead();document.getElementById("view").innerHTML=(VIEWS[state.lens]||viewGeral)();}
render();
boot();
</script>
