name: Gerar editoriais faltantes

# Disparo manual. Gera o editorial das semanas que ficaram sem ele (editorial: null),
# SEM refazer a coleta de notícias. Usa os dados já salvos + o Gemini só para o texto.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-editorial:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install google-genai supabase

      - name: Gerar editoriais faltantes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fix_editorial.py

      - name: Publicar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Fix: gerar editoriais faltantes"
          git push
