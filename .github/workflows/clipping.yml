name: Clipping Semanal

# Dois disparos por semana:
#  - Segunda 10h UTC (07h Divinópolis) = clipping principal da semana
#  - Quinta  10h UTC (07h Divinópolis) = atualização + mantém o Supabase acordado
# Como o motor respeita "1 ciclo = 1 semana", a quinta NÃO infla a relevância:
# ela atualiza o que mudou e mantém o banco ativo (evita a pausa de 7 dias).
# O botão de disparo manual (workflow_dispatch) usa a mesma lógica.
on:
  schedule:
    - cron: "0 10 * * 1"
    - cron: "0 10 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-clipping:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install google-genai supabase

      - name: Rodar o motor do clipping
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python motor.py

      - name: Publicar os dados gerados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Clipping automático: $(date +'%Y-%m-%d %H:%M')"
          git push
