name: Corrigir ultimo.json

# Disparo manual. Reconstrói ultimo.json e index.json a partir dos arquivos
# de semana já existentes em data/, apontando para a semana mais recente.
# Não usa Gemini nem Supabase — é rápido e seguro.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rodar o fix
        run: python fix_ultimo.py

      - name: Publicar os dados corrigidos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Fix: ultimo.json aponta para a semana mais recente"
          git push
